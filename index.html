<!--
  ============================================================================
  AUST ROBOTICS CLUB — Bootcamp & Room Booking System
  ============================================================================
  SETUP (read this before deploying):

  1. FIREBASE
     - Create a Firebase project -> Build -> Realtime Database -> Create DB.
     - Project settings -> General -> Add a Web App -> copy the config object
       and paste it into FIREBASE_CONFIG below.
     - Realtime Database -> Rules -> since this app has no Firebase Auth and
       does its own password check in JS, use rules like:
         {
           "rules": { ".read": true, ".write": true }
         }
       This is fine for a small club tool, but anyone with the DB URL can
       write to it. If you want it locked down harder later, add Firebase
       Auth (e.g. Anonymous Auth) and rewrite the rules — ask Claude if you
       want help with that upgrade.

  2. ASSETS (put these in your GitHub repo, SAME FOLDER as this index.html —
     no subfolder needed)
       varsity-bg.jpg   -> background photo of AUST campus
       logo.png         -> AUST Robotics Club logo (transparent PNG)
       banner.png       -> banner shown to mentors on the bootcamp/apply
                            page and on the mentor dashboard
     If they're missing, the page still works (banner just won't show, bg
     falls back to a dark gradient).

  3. DEPLOY
     - Push this repo to GitHub.
     - Netlify -> Add new site -> Import from GitHub -> pick the repo ->
       Deploy (no build command needed, publish directory = root).

  4. MASTER ADMIN PASSWORD
     - Set below in ADMIN_PASSWORD. Default is "092418" as requested.
  ============================================================================
-->

<style>
:root{
  --bg:#05070a;
  --bg-deep:#020304;
  --panel:rgba(13,20,26,0.72);
  --panel-solid:#0b131a;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(0,229,255,0.28);
  --border-soft:rgba(255,255,255,0.09);
  --cyan:#00e5ff;
  --cyan-dim:#0aa8c2;
  --purple:#a742ff;
  --amber:#ffb020;
  --green:#3ddc84;
  --red:#ff5468;
  --text:#e9f6fb;
  --text-dim:#8ba3ae;
  --text-faint:#516670;
  --radius:14px;
  --font-display:'Orbitron', sans-serif;
  --font-mono:'Space Mono', monospace;
  --font-body:'Inter', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  color:var(--text);
  background:var(--bg-deep);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
::selection{background:var(--cyan); color:#00151a;}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--cyan-dim); border-radius:10px;}

/* ---------- background layer ---------- */
#bg-layer{
  position:fixed; inset:0; z-index:0;
  background:
    linear-gradient(180deg, rgba(2,3,4,0.88) 0%, rgba(2,4,6,0.93) 45%, rgba(3,5,8,0.98) 100%),
    url('varsity-bg.jpg') center/cover no-repeat,
    radial-gradient(ellipse at 30% 20%, #10202b 0%, #05070a 60%);
}
#bg-layer::before{
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(ellipse at 50% 0%, black 0%, transparent 70%);
  opacity:.6;
}
#bg-layer::after{
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(circle at 85% 90%, rgba(167,66,255,0.14), transparent 45%);
}

#app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column;}

/* ---------- topbar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 26px;
  border-bottom:1px solid var(--border-soft);
  backdrop-filter:blur(10px);
  background:rgba(5,7,10,0.45);
  position:sticky; top:0; z-index:20;
  flex-wrap:wrap; gap:12px;
}
.brand{display:flex; align-items:center; gap:12px; cursor:pointer;}
.brand-logo{
  width:42px; height:42px; border-radius:10px;
  background:var(--panel-solid);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  box-shadow:0 0 18px rgba(0,229,255,0.25);
}
.brand-logo img{width:100%; height:100%; object-fit:cover;}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text b{font-family:var(--font-display); font-size:15px; letter-spacing:1.5px; color:var(--text);}
.brand-text span{font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--cyan); text-transform:uppercase;}
.top-actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}

/* ---------- buttons ---------- */
.btn{
  font-family:var(--font-mono);
  font-size:12.5px; letter-spacing:.5px;
  padding:10px 18px;
  border-radius:9px;
  border:1px solid var(--border);
  background:rgba(0,229,255,0.06);
  color:var(--cyan);
  cursor:pointer;
  transition:.18s ease;
  text-transform:uppercase;
  white-space:nowrap;
}
.btn:hover{background:rgba(0,229,255,0.16); box-shadow:0 0 16px rgba(0,229,255,0.25); transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn.solid{background:var(--cyan); color:#00181d; border-color:var(--cyan); font-weight:700;}
.btn.solid:hover{background:#37f0ff;}
.btn.purple{border-color:rgba(167,66,255,0.5); color:#cb93ff; background:rgba(167,66,255,0.08);}
.btn.purple:hover{background:rgba(167,66,255,0.2); box-shadow:0 0 16px rgba(167,66,255,0.3);}
.btn.danger{border-color:rgba(255,84,104,0.5); color:#ff8a97; background:rgba(255,84,104,0.08);}
.btn.danger:hover{background:rgba(255,84,104,0.2); box-shadow:0 0 16px rgba(255,84,104,0.25);}
.btn.ghost{background:transparent; border-color:var(--border-soft); color:var(--text-dim);}
.btn.ghost:hover{border-color:var(--border); color:var(--text);}
.btn.sm{padding:6px 12px; font-size:11px;}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}

/* ---------- layout helpers ---------- */
.container{max-width:1180px; margin:0 auto; padding:34px 22px 70px; width:100%; flex:1;}
.hero{text-align:center; padding:64px 22px 40px; position:relative;}
.hero h1{
  font-family:var(--font-display); font-weight:900;
  font-size:clamp(28px,5vw,52px);
  letter-spacing:3px;
  background:linear-gradient(90deg,#fff,var(--cyan) 55%,var(--purple));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 40px rgba(0,229,255,0.15);
}
.hero p{font-family:var(--font-mono); color:var(--text-dim); margin-top:12px; font-size:13px; letter-spacing:1px;}
.eyebrow{
  display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:3px;
  color:var(--cyan); text-transform:uppercase; margin-bottom:14px; opacity:.85;
}

.section-title{
  font-family:var(--font-display); font-size:20px; letter-spacing:1.5px;
  color:var(--text); margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.section-title::before{content:''; width:6px; height:20px; background:linear-gradient(var(--cyan),var(--purple)); border-radius:3px;}

/* PCB-style clipped card */
.card{
  background:var(--panel);
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:22px;
  backdrop-filter:blur(14px);
  position:relative;
  clip-path:polygon(0 14px,14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);
}
.card::before{
  content:''; position:absolute; inset:0;
  clip-path:polygon(0 14px,14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);
  padding:1px; pointer-events:none;
  background:linear-gradient(135deg, rgba(0,229,255,0.35), transparent 40%, rgba(167,66,255,0.3));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
}

.grid{display:grid; gap:18px;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:820px){.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}

.bootcamp-card{cursor:pointer; transition:.2s;}
.bootcamp-card:hover{transform:translateY(-3px); border-color:var(--border); box-shadow:0 10px 30px rgba(0,229,255,0.08);}
.bootcamp-card h3{font-family:var(--font-display); font-size:17px; letter-spacing:.5px; margin-bottom:6px;}
.bootcamp-card .meta{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); display:flex; gap:14px; flex-wrap:wrap;}
.bootcamp-card .meta span{color:var(--cyan);}
.tag{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:1px;
  padding:4px 10px; border-radius:20px; text-transform:uppercase;
  border:1px solid var(--border-soft); color:var(--text-dim);
}
.tag.pending{color:var(--amber); border-color:rgba(255,176,32,0.4); background:rgba(255,176,32,0.07);}
.tag.approved{color:var(--green); border-color:rgba(61,220,132,0.4); background:rgba(61,220,132,0.07);}

.empty{
  font-family:var(--font-mono); color:var(--text-faint); text-align:center;
  padding:38px 12px; border:1px dashed var(--border-soft); border-radius:12px; font-size:12.5px;
}

/* ---------- forms ---------- */
label{display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:1px; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase;}
input[type=text],input[type=password],input[type=tel],input[type=number],select,textarea{
  width:100%; padding:11px 13px; border-radius:9px;
  background:rgba(255,255,255,0.03); border:1px solid var(--border-soft);
  color:var(--text); font-family:var(--font-body); font-size:14px;
  outline:none; transition:.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,0.1);}
.field{margin-bottom:16px;}
.form-row{display:flex; gap:12px; flex-wrap:wrap;}
.form-row .field{flex:1; min-width:160px;}
.form-actions{display:flex; gap:10px; margin-top:6px; flex-wrap:wrap;}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(2,3,5,0.72); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:18px;
}
.modal{
  width:100%; max-width:460px; max-height:88vh; overflow-y:auto;
  background:var(--panel-solid); border:1px solid var(--border);
  border-radius:16px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal h2{font-family:var(--font-display); font-size:18px; letter-spacing:1px; margin-bottom:18px;}
.modal-close-row{display:flex; justify-content:flex-end; margin-top:14px;}

/* ---------- tabs ---------- */
.tabs{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; border-bottom:1px solid var(--border-soft); padding-bottom:14px;}
.tab-btn{
  font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
  padding:9px 16px; border-radius:8px; border:1px solid transparent; background:transparent;
  color:var(--text-dim); cursor:pointer; transition:.15s;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--cyan); background:rgba(0,229,255,0.08); border-color:var(--border);}

/* ---------- lists / tables ---------- */
.list-item{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  padding:14px 16px; border-radius:10px; background:rgba(255,255,255,0.025);
  border:1px solid var(--border-soft); margin-bottom:10px; flex-wrap:wrap;
}
.list-item .info b{font-family:var(--font-body); font-size:14px; display:block; margin-bottom:3px;}
.list-item .info .sub{font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}
.list-item .actions{display:flex; gap:8px; flex-wrap:wrap;}

/* ---------- day/slot grid ---------- */
.day-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px;}
.day-tab{
  font-family:var(--font-mono); font-size:11.5px; padding:8px 14px; border-radius:20px;
  border:1px solid var(--border-soft); background:transparent; color:var(--text-dim); cursor:pointer;
}
.day-tab.active{background:var(--cyan); color:#00181d; border-color:var(--cyan); font-weight:700;}
.slot-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;}
.slot-chip{
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; border-radius:9px; border:1px solid var(--border-soft);
  background:rgba(255,255,255,0.02); cursor:pointer; font-family:var(--font-mono); font-size:12px;
  transition:.15s; user-select:none;
}
.slot-chip input{accent-color:var(--cyan); width:15px; height:15px;}
.slot-chip.checked{border-color:var(--cyan); background:rgba(0,229,255,0.1); color:var(--cyan);}
.slot-chip.locked{opacity:.55;}

/* result cards for room check */
.result-room{
  border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px;
  background:rgba(61,220,132,0.04);
}
.result-room h4{font-family:var(--font-display); font-size:15px; color:var(--green); margin-bottom:8px;}
.result-room .slots{display:flex; gap:8px; flex-wrap:wrap;}
.result-room .slots span{
  font-family:var(--font-mono); font-size:11px; padding:5px 10px; border-radius:14px;
  background:rgba(61,220,132,0.12); color:#8ef2b8; border:1px solid rgba(61,220,132,0.3);
}

/* login card center */
.center-wrap{display:flex; align-items:center; justify-content:center; min-height:70vh; padding:20px;}
.auth-card{width:100%; max-width:380px;}
.auth-card .eyebrow{display:block; text-align:center;}
.auth-card h2{font-family:var(--font-display); text-align:center; font-size:19px; margin-bottom:22px; letter-spacing:1px;}

/* toast */
#toast-wrap{position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px;}
.toast{
  font-family:var(--font-mono); font-size:12.5px; padding:12px 18px; border-radius:9px;
  background:var(--panel-solid); border:1px solid var(--border); color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:slideIn .25s ease;
  max-width:320px;
}
.toast.err{border-color:rgba(255,84,104,0.5); color:#ff8a97;}
.toast.ok{border-color:rgba(61,220,132,0.5); color:#8ef2b8;}
@keyframes slideIn{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);}}

/* ---------- banner (mobile only, original ratio) ---------- */
.banner-frame{
  display:none;
  position:relative;
  width:100%; border-radius:16px; overflow:hidden; margin-bottom:26px;
  border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(0,229,255,0.08), 0 0 34px rgba(0,229,255,0.22), 0 0 70px rgba(167,66,255,0.12);
}
.banner-frame img{width:100%; display:block; height:auto;}
.banner-frame::after{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(180deg, rgba(0,229,255,0.08) 0%, transparent 30%, transparent 70%, rgba(2,3,5,0.5) 100%);
}
@media(max-width:768px){
  .banner-frame{ display:block; }
}

/* ---------- glossy / neon upgrades ---------- */
@keyframes neonPulse{
  0%,100%{box-shadow:0 0 10px rgba(0,229,255,0.15), inset 0 1px 0 rgba(255,255,255,0.06);}
  50%{box-shadow:0 0 22px rgba(0,229,255,0.35), inset 0 1px 0 rgba(255,255,255,0.1);}
}
@keyframes titleFlicker{
  0%,19%,21%,23%,80%,100%{opacity:1;}
  20%,22%{opacity:.82;}
}
.brand-logo{animation:neonPulse 3.2s ease-in-out infinite;}
.hero h1{animation:titleFlicker 6s linear infinite;}

.btn{
  position:relative; overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,229,255,0.05));
  box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 0 0 rgba(0,229,255,0);
}
.btn::before{
  content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(115deg, transparent, rgba(255,255,255,0.35), transparent);
  transform:skewX(-20deg); transition:left .55s ease;
}
.btn:hover::before{left:130%;}
.btn:hover{box-shadow:0 0 18px rgba(0,229,255,0.35), 0 2px 0 rgba(255,255,255,0.05) inset;}
.btn.solid{
  background:linear-gradient(180deg,#4df3ff,var(--cyan) 55%,#00c2dd);
  box-shadow:0 0 16px rgba(0,229,255,0.4), 0 2px 0 rgba(255,255,255,0.25) inset;
}
.btn.solid:hover{box-shadow:0 0 26px rgba(0,229,255,0.6), 0 2px 0 rgba(255,255,255,0.3) inset; transform:translateY(-2px);}
.btn.purple:hover{box-shadow:0 0 20px rgba(167,66,255,0.45);}
.btn.danger:hover{box-shadow:0 0 20px rgba(255,84,104,0.4);}

.card{
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 20px 50px rgba(0,0,0,0.35);
  transition:box-shadow .25s ease, border-color .25s ease;
}
.card::after{
  content:''; position:absolute; top:0; left:0; right:0; height:45%;
  background:linear-gradient(180deg, rgba(255,255,255,0.05), transparent);
  pointer-events:none; clip-path:inherit;
}
.bootcamp-card:hover{box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 16px 40px rgba(0,229,255,0.16), 0 0 0 1px rgba(0,229,255,0.25);}

.day-tab.active,.tab-btn.active{box-shadow:0 0 14px rgba(0,229,255,0.4);}
.slot-chip.checked{box-shadow:0 0 12px rgba(0,229,255,0.25);}

.footer-note{
  text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--cyan);
  padding:26px; letter-spacing:1px; line-height:2;
  text-shadow:0 0 6px rgba(0,229,255,0.55), 0 0 16px rgba(0,229,255,0.3);
}
.footer-note b{
  color:#fff; font-weight:700;
  text-shadow:0 0 8px rgba(255,255,255,0.6), 0 0 18px rgba(167,66,255,0.4);
}
.breadcrumb{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); margin-bottom:18px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.breadcrumb a{color:var(--cyan); cursor:pointer; text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}

.setup-banner{
  background:rgba(255,176,32,0.08); border:1px solid rgba(255,176,32,0.35); color:#ffd899;
  font-family:var(--font-mono); font-size:12px; padding:14px 18px; border-radius:10px; margin:0 auto 22px; max-width:1180px;
}

/* room search dropdown — light green bg, golden text for clear visibility */
#mu-room{
  background:rgba(61,220,132,0.14);
  color:var(--amber);
  border-color:rgba(61,220,132,0.4);
  font-weight:700;
}
#mu-room option{
  background:#0b1a12;
  color:var(--amber);
}
</style>
</head>

  mentorTab: "check",         // check | update
  mentorUpdateRoom: null,
  mentorUpdateDay: DAYS[0],
  mentorCheckDay: DAYS[0],
  mentorCheckSlots: {},       // selected slot ids for search
  publicBootcampMode: null,   // 'apply' | 'login' | null
};

function uid(){ return db.ref().push().key; }

function toast(msg, type=""){
  const el = document.createElement("div");
  el.className = "toast" + (type ? " "+type : "");
  el.textContent = msg;
  document.getElementById("toast-wrap").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); }, 3200);
}

function navigate(view, opts={}){
  state.view = view;
  Object.assign(state, opts);
  pushHistorySnapshot();
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

function pushHistorySnapshot(){
  const snapshot = JSON.parse(JSON.stringify(state));
  history.pushState({ snapshot }, "", "");
}

window.addEventListener("popstate", (e)=>{
  if(e.state && e.state.snapshot){
    Object.assign(state, e.state.snapshot);
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  } else {
    state.view = "home";
    render();
  }
});

function addBootcamp(name, sessions){

  db.ref("bootcamps/"+id).set({

    rooms: templateRooms, timeSlots: templateSlots,
    schedule:{}, mentorRequests:{}, roomRequests:{}
  });

}
function deleteBootcamp(id){
  if(!confirm("Delete this bootcamp and ALL its data (rooms, mentors, schedules)? This cannot be undone.")) return;
  db.ref("bootcamps/"+id).remove();
  toast("Bootcamp deleted", "ok");
  navigate("adminDashboard", {adminTab:"bootcamps", adminBootcampView:null});
}
function addRoom(bootcampId, name){

  db.ref(`bootcamps/${bootcampId}/mentorRequests/${id}`).set({ name, phone, password, status:"pending", appliedAt: Date.now() });

}
function approveMentor(bootcampId, reqId){
  db.ref(`bootcamps/${bootcampId}/mentorRequests/${reqId}/status`).set("approved");
  toast("Mentor approved", "ok");
}
function rejectOrKickMentor(bootcampId, reqId){
  if(!confirm("Remove this mentor / application?")) return;
  db.ref(`bootcamps/${bootcampId}/mentorRequests/${reqId}`).remove();
  toast("Removed", "ok");
}
function updateMentor(bootcampId, reqId, data){
  db.ref(`bootcamps/${bootcampId}/mentorRequests/${reqId}`).update(data);
  toast("Mentor updated", "ok");
}
function manualAddMentor(bootcampId, name, phone, password){
  const id = uid();
  db.ref(`bootcamps/${bootcampId}/mentorRequests/${id}`).set({ name, phone, password, status:"approved", appliedAt: Date.now() });
  toast("Mentor added", "ok");
}
function submitRoomRequest(bootcampId, mentorId, mentorName, roomId, roomName, day, slotIds){
  const id = uid();
  db.ref(`bootcamps/${bootcampId}/roomRequests/${id}`).set({
    mentorId, mentorName, roomId, roomName, day, slots: slotIds, status:"pending", submittedAt: Date.now()
  });
  toast("Room update submitted for admin approval", "ok");
}
function approveRoomRequest(bootcampId, reqId, req){
  const dayRef = db.ref(`bootcamps/${bootcampId}/schedule/${req.roomId}/${req.day}`);
  dayRef.transaction(currentData => {
    const existing = currentData || {};
    (req.slots||[]).forEach(s=> existing[s] = req.mentorName || "Admin");
    return existing;
  }).then(()=>{
    db.ref(`bootcamps/${bootcampId}/roomRequests/${reqId}`).remove();
    toast("Room schedule updated (merged with existing free slots)", "ok");
  }).catch(err=>{
    console.error(err);
    toast("Failed to update schedule — please try again", "err");
  });
}
function rejectRoomRequest(bootcampId, reqId){
  db.ref(`bootcamps/${bootcampId}/roomRequests/${reqId}`).remove();
  toast("Request rejected", "ok");
}
function adminSetSchedule(bootcampId, roomId, day, slotIds){
  const dayRef = db.ref(`bootcamps/${bootcampId}/schedule/${roomId}/${day}`);
  dayRef.transaction(currentData => {
    const existing = currentData || {};
    const slotObj = {};
    slotIds.forEach(s=> slotObj[s] = existing[s] || "Admin");
    return slotObj;
  }).then(()=>{
    toast("Schedule saved", "ok");
  }).catch(err=>{
    console.error(err);
    toast("Failed to save schedule — please try again", "err");
  });
}
function app_removeStatusSlot(bootcampId, roomId, day, slotId){
  if(!confirm("Remove this free slot entry?")) return;
  db.ref(`bootcamps/${bootcampId}/schedule/${roomId}/${day}/${slotId}`).remove();
  toast("Slot removed", "ok");
}
function app_saveStatusSlots(bootcampId, roomId, day){
  const checked = Array.from(document.querySelectorAll(`#status-slot-grid-${roomId} input[type=checkbox]:checked`)).map(i=>i.dataset.slot);
  adminSetSchedule(bootcampId, roomId, day, checked);
}

          <label class="slot-chip ${current[sid]?'checked':''}" onclick="this.classList.toggle('checked')">
            <input type="checkbox" data-slot="${sid}" ${current[sid]?'checked':''} onchange="this.closest('.slot-chip').classList.toggle('checked', this.checked)">
            ${esc(sname)}
          </label>`).join("")}
      </div>
      <div class="form-actions" style="margin-top:18px;">
        <button class="btn solid" onclick="app_adminSaveSchedule('${bootcampId}','${roomId}','${day}')">Save ${day}</button>
      </div>
      ` : `<div class="empty">Add time slots to this bootcamp first.</div>`}
    </div>
  </div>`;
}
function app_adminSaveSchedule(bootcampId, roomId, day){
  const checked = Array.from(document.querySelectorAll('#admin-slot-grid input[type=checkbox]:checked')).map(i=>i.dataset.slot);
  adminSetSchedule(bootcampId, roomId, day, checked);
}

function renderAdminMentorsTab(){
  const rows = [];
  entries(state.bootcamps).forEach(([bid,b])=>{
    entries(b.mentorRequests).forEach(([mid,m])=> rows.push({bid, bname:b.name, mid, ...m}));
  });
  const running = rows.filter(r=>r.status==="approved");
  const pending = rows.filter(r=>r.status==="pending");
  const bootcampOptions = entries(state.bootcamps).map(([id,b])=>`<option value="${id}">${esc(b.name)}</option>`).join("");

  return `
  <div class="card" style="margin-bottom:24px; max-width:560px;">
    <h3 style="font-family:var(--font-display); font-size:15px; margin-bottom:14px;">Manually Add Mentor</h3>
    ${entries(state.bootcamps).length ? `
    <div class="field"><label>Bootcamp</label><select id="mm-bootcamp">${bootcampOptions}</select></div>
    <div class="form-row">
      <div class="field"><label>Name</label><input type="text" id="mm-name"></div>
      <div class="field"><label>Phone</label><input type="tel" id="mm-phone"></div>
      <div class="field"><label>Password</label><input type="password" id="mm-pass"></div>
    </div>
    <div class="form-actions"><button class="btn solid" onclick="app_manualAddMentor()">Add Mentor (auto-approved)</button></div>
    ` : `<div class="empty">Create a bootcamp first.</div>`}
  </div>

  <h3 style="font-family:var(--font-display); font-size:14.5px; margin:20px 0 12px; color:var(--green);">Running Mentors</h3>
  ${running.length ? running.map(r=>`
    <div class="list-item">
      <div class="info"><b>${esc(r.name)} <span class="tag approved">approved</span></b><div class="sub">${esc(r.phone)} · Pass: ${esc(r.password)} · ${esc(r.bname)}</div></div>
      <div class="actions">
        <button class="btn sm" onclick="app_editMentorPrompt('${r.bid}','${r.mid}','${esc(r.name)}','${esc(r.phone)}','${esc(r.password)}')">Edit</button>
        <button class="btn danger sm" onclick="rejectOrKickMentor('${r.bid}','${r.mid}')">Kick</button>
      </div>
    </div>`).join("") : `<div class="empty">No approved mentors yet.</div>`}

  <h3 style="font-family:var(--font-display); font-size:14.5px; margin:24px 0 12px; color:var(--amber);">Requested Mentors</h3>
  ${pending.length ? pending.map(r=>`
    <div class="list-item">
      <div class="info"><b>${esc(r.name)} <span class="tag pending">pending</span></b><div class="sub">${esc(r.phone)} · Pass: ${esc(r.password)} · ${esc(r.bname)}</div></div>
      <div class="actions">
        <button class="btn sm" onclick="app_editMentorPrompt('${r.bid}','${r.mid}','${esc(r.name)}','${esc(r.phone)}','${esc(r.password)}')">Edit</button>
        <button class="btn solid sm" onclick="approveMentor('${r.bid}','${r.mid}')">Approve</button>
        <button class="btn danger sm" onclick="rejectOrKickMentor('${r.bid}','${r.mid}')">Reject</button>
      </div>
    </div>`).join("") : `<div class="empty">No pending applications.</div>`}
  `;
}
function app_manualAddMentor(){
  const bootcampId = document.getElementById("mm-bootcamp").value;
  const name = document.getElementById("mm-name").value.trim();
  const phone = document.getElementById("mm-phone").value.trim();
  const pass = document.getElementById("mm-pass").value;
  if(!name || !phone || !pass){ toast("Fill all fields", "err"); return; }
  manualAddMentor(bootcampId, name, phone, pass);
  render();
}
function app_editMentorPrompt(bid, mid, curName, curPhone, curPass){
  const name = prompt("Edit mentor name:", curName);
  if(name===null) return;
  const phone = prompt("Edit mentor phone:", curPhone);
  if(phone===null) return;
  const pass = prompt("Edit mentor password:", curPass || "");
  if(pass===null) return;
  const data = {name, phone, password: pass};
  updateMentor(bid, mid, data);
}

function renderAdminRoomStatusTab(){
  const list = entries(state.bootcamps);
  return `
  ${list.length ? list.map(([id,b])=>`
    <div class="list-item" style="cursor:pointer;" onclick="navigate('adminDashboard',{statusBootcampView:'${id}', statusDay:'${DAYS[0]}'})">
      <div class="info"><b>${esc(b.name)}</b><div class="sub">${entries(b.rooms).length} rooms</div></div>
      <div class="actions"><button class="btn sm">View Status</button></div>
    </div>`).join("") : `<div class="empty">No bootcamps yet.</div>`}
  `;
}

function renderAdminRoomStatusDetail(){
  const id = state.statusBootcampView;
  const b = state.bootcamps[id];
  if(!b) return renderAdminDashboard();
  const day = state.statusDay || DAYS[0];
  const rooms = entries(b.rooms);
  const slots = entries(b.timeSlots);

  return `
  ${topbar()}
  <div class="container">
    <div class="breadcrumb"><a onclick="navigate('adminDashboard',{adminTab:'roomStatus', statusBootcampView:null})">Room Status</a> / ${esc(b.name)}</div>
    <div class="section-title">Current Room Status — ${esc(b.name)}</div>
    <div class="day-tabs">
      ${DAYS.map(d=>`<button class="day-tab ${d===day?'active':''}" onclick="navigate('adminDashboard',{statusDay:'${d}'})">${d}</button>`).join("")}
    </div>
    ${rooms.length ? rooms.map(([rid,rname])=>{
      const freeSlots = (b.schedule && b.schedule[rid] && b.schedule[rid][day]) || {};
      const freeEntries = slots.filter(([sid])=> freeSlots[sid]);
      return `
      <div class="card" style="margin-bottom:18px;">
        <h3 style="font-family:var(--font-display); font-size:15px; margin-bottom:12px;">${esc(rname)}</h3>
        ${freeEntries.length ? freeEntries.map(([sid,sname])=>{
          const who = (freeSlots[sid] === true) ? "Admin" : esc(freeSlots[sid]);
          return `<div class="list-item">
            <div class="info"><b>${esc(sname)}</b><div class="sub">Free — submitted by: ${who}</div></div>
            <div class="actions"><button class="btn danger sm" onclick="app_removeStatusSlot('${id}','${rid}','${day}','${sid}')">Delete</button></div>
          </div>`;
        }).join("") : `<div class="empty">No free slots marked for ${day}.</div>`}
        <details style="margin-top:14px;">
          <summary style="cursor:pointer; font-family:var(--font-mono); font-size:11px; color:var(--cyan);">Edit / Add free slots for ${day}</summary>
          ${slots.length ? `
          <div class="slot-grid" id="status-slot-grid-${rid}" style="margin-top:12px;">
            ${slots.map(([sid,sname])=>`
              <label class="slot-chip ${freeSlots[sid]?'checked':''}" onclick="this.classList.toggle('checked')">
                <input type="checkbox" data-slot="${sid}" ${freeSlots[sid]?'checked':''} onchange="this.closest('.slot-chip').classList.toggle('checked', this.checked)">
                ${esc(sname)}
              </label>`).join("")}
          </div>
          <div class="form-actions" style="margin-top:14px;">
            <button class="btn solid sm" onclick="app_saveStatusSlots('${id}','${rid}','${day}')">Save Changes</button>
          </div>
          ` : `<div class="empty">No time slots configured.</div>`}
        </details>
      </div>`;
    }).join("") : `<div class="empty">No rooms in this bootcamp.</div>`}
  </div>`;
}

function renderAdminRoomRequestsTab(){
  const rows = [];
  entries(state.bootcamps).forEach(([bid,b])=>{
    entries(b.roomRequests).forEach(([rid,r])=> rows.push({bid, bname:b.name, rid, ...r}));
  });
  return rows.length ? rows.map(r=>{
    const slotNames = (r.slots||[]).map(sid=> (state.bootcamps[r.bid].timeSlots||{})[sid] || sid);
    return `
    <div class="list-item" style="align-items:flex-start;">
      <div class="info">
        <b>${esc(r.mentorName)} <span class="tag pending">pending</span></b>
        <div class="sub">${esc(r.bname)} · ${esc(r.roomName)} · ${esc(r.day)}</div>
        <div class="sub" style="margin-top:6px;">Slots: ${slotNames.map(esc).join(", ")}</div>
      </div>
      <div class="actions">
        <button class="btn solid sm" onclick='approveRoomRequest("${r.bid}","${r.rid}", ${JSON.stringify({roomId:r.roomId, day:r.day, slots:r.slots, mentorName:r.mentorName}).replace(/'/g,"&#39;")})'>Approve</button>
        <button class="btn danger sm" onclick="rejectRoomRequest('${r.bid}','${r.rid}')">Reject</button>
      </div>
    </div>`;
  }).join("") : `<div class="empty">No room update requests right now.</div>`;
}

/* ============================================================================
   RENDER — MENTOR DASHBOARD
   ============================================================================ */
function renderMentorDashboard(){
  if(!state.mentor) return renderHome();
  const b = state.bootcamps[state.mentor.bootcampId];
  if(!b){
    if(!state.dataLoaded){
      return `${topbar()}<div class="container"><div class="empty">Loading your bootcamp data…</div></div>`;
    }
    app_logoutMentor();
    return renderHome();
  }

  const tabs = [["check","Room Check"],["update","Room Data Update"]];
  let content = state.mentorTab === "check" ? renderMentorRoomCheck(b) : renderMentorRoomUpdate(b);

  return `
  ${topbar()}
  <div class="container">
    <div class="breadcrumb">${esc(b.name)} / Mentor: ${esc(state.mentor.name)}</div>
    ${bannerBlock()}
    <div class="section-title">Mentor Dashboard</div>
    <div class="tabs">
      ${tabs.map(([k,l])=>`<button class="tab-btn ${state.mentorTab===k?'active':''}" onclick="navigate('mentorDashboard',{mentorTab:'${k}', mentorCheckSlots:{}})">${l}</button>`).join("")}
    </div>
    ${content}
  </div>`;
}

function renderMentorRoomCheck(b){
  const slots = entries(b.timeSlots);
  const rooms = entries(b.rooms);
  const day = state.mentorCheckDay;

  return `
  <div class="card">
    <h3 style="font-family:var(--font-display); font-size:14.5px; margin-bottom:14px;">Find Free Rooms</h3>
    <div class="day-tabs">
      ${DAYS.map(d=>`<button class="day-tab ${d===day?'active':''}" onclick="navigate('mentorDashboard',{mentorCheckDay:'${d}'})">${d}</button>`).join("")}
    </div>
    ${slots.length ? `
    <label style="margin-bottom:10px;">Select desired time slots</label>
    <div class="slot-grid" id="check-slot-grid">
      ${slots.map(([sid,sname])=>`
        <label class="slot-chip ${state.mentorCheckSlots[sid]?'checked':''}" onclick="app_toggleCheckSlot('${sid}', this)">
          <input type="checkbox" data-slot="${sid}" ${state.mentorCheckSlots[sid]?'checked':''} onclick="event.stopPropagation()" onchange="app_toggleCheckSlot('${sid}', this.closest('.slot-chip'))">
          ${esc(sname)}
        </label>`).join("")}
    </div>
    <div class="form-actions" style="margin-top:18px;">
      <button class="btn solid" onclick="app_searchRooms()">Search Available Rooms</button>
    </div>
    <div id="check-results" style="margin-top:20px;"></div>
    ` : `<div class="empty">No time slots configured for this bootcamp yet.</div>`}
  </div>`;
}
function app_toggleCheckSlot(sid, el){
  if(state.mentorCheckSlots[sid]) delete state.mentorCheckSlots[sid];
  else state.mentorCheckSlots[sid] = true;
  el.classList.toggle("checked", !!state.mentorCheckSlots[sid]);
  app_searchRooms();
}
function app_searchRooms(){
  if(!state.mentor) return;
  const b = state.bootcamps[state.mentor.bootcampId];
  if(!b) return;
  const day = state.mentorCheckDay;
  const selected = Object.keys(state.mentorCheckSlots);
  const resultsEl = document.getElementById("check-results");
  if(!resultsEl) return;

  if(!selected.length){
    resultsEl.innerHTML = `<div class="empty">Select one or more time slots above to see available rooms.</div>`;
    return;
  }

  const rooms = entries(b.rooms);
  const matches = [];
  rooms.forEach(([rid,rname])=>{
    const freeSlots = (b.schedule && b.schedule[rid] && b.schedule[rid][day]) || {};
    const free = selected.filter(sid => freeSlots[sid]);
    if(free.length) matches.push({rid, rname, free});
  });

  if(!matches.length){
    resultsEl.innerHTML = `<div class="empty">No rooms are free for the selected time slots on ${day}.</div>`;
    return;
  }
  resultsEl.innerHTML = matches.map(m=>`
    <div class="result-room">
      <h4>${esc(m.rname)} — ${m.free.length} match${m.free.length>1?'es':''}</h4>
      <div class="slots">${m.free.map(sid=>`<span>${esc(b.timeSlots[sid])}</span>`).join("")}</div>
    </div>`).join("");
}

function renderMentorRoomUpdate(b){
  const rooms = entries(b.rooms);
  const slots = entries(b.timeSlots);
  const roomId = state.mentorUpdateRoom;
  const day = state.mentorUpdateDay;
  const current = roomId ? ((b.schedule && b.schedule[roomId] && b.schedule[roomId][day]) || {}) : {};
  const myPending = entries(b.roomRequests || {}).filter(([rid,r])=> r.mentorId === state.mentor.mentorId);

  return `
  ${myPending.length ? `
  <div class="card" style="margin-bottom:18px; border-color: rgba(255,176,32,0.4);">
    <h3 style="font-family:var(--font-display); font-size:14px; margin-bottom:12px; color:var(--amber);">Your Pending Submissions (waiting for admin approval)</h3>
    ${myPending.map(([rid,r])=>{
      const slotNames = (r.slots||[]).map(sid=> (b.timeSlots||{})[sid] || sid);
      return `<div class="list-item">
        <div class="info"><b>${esc(r.roomName)} — ${esc(r.day)}</b><div class="sub">${slotNames.map(esc).join(", ")}</div></div>
        <span class="tag pending">pending</span>
      </div>`;
    }).join("")}
  </div>` : ``}
  <div class="card">
    <h3 style="font-family:var(--font-display); font-size:14.5px; margin-bottom:14px;">Update Room Data</h3>
    ${rooms.length ? `
    <div class="field" style="max-width:320px;">
      <label>Room</label>
      <select id="mu-room" onchange="navigate('mentorDashboard',{mentorUpdateRoom:this.value})">
        <option value="">— choose a room —</option>
        ${rooms.map(([rid,rname])=>`<option value="${rid}" ${roomId===rid?'selected':''}>${esc(rname)}</option>`).join("")}
      </select>
    </div>
    ${roomId ? `
      <div class="day-tabs" style="margin-top:18px;">
        ${DAYS.map(d=>`<button class="day-tab ${d===day?'active':''}" onclick="navigate('mentorDashboard',{mentorUpdateDay:'${d}'})">${d}</button>`).join("")}
      </div>
      ${slots.length ? `
      <div class="slot-grid" id="update-slot-grid">
        ${slots.map(([sid,sname])=>`
          <label class="slot-chip ${current[sid]?'checked':''}" onclick="this.classList.toggle('checked')">
            <input type="checkbox" data-slot="${sid}" ${current[sid]?'checked':''} onchange="this.closest('.slot-chip').classList.toggle('checked', this.checked)">
            ${esc(sname)}
          </label>`).join("")}
      </div>
      <p style="font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-top:12px;">
        Marking a slot means this room is FREE / available at that time. Save sends it to the admin for approval — nothing goes live until approved.
      </p>
      <div class="form-actions" style="margin-top:14px;">
        <button class="btn solid" onclick="app_submitRoomUpdate()">Save ${day}</button>
      </div>
      ` : `<div class="empty">No time slots configured yet.</div>`}
    ` : ``}
    ` : `<div class="empty">No rooms configured for this bootcamp yet.</div>`}
  </div>`;
}
function app_submitRoomUpdate(){
  const b = state.bootcamps[state.mentor.bootcampId];
  const roomId = state.mentorUpdateRoom;
  const day = state.mentorUpdateDay;
  const roomName = b.rooms[roomId];
  const checked = Array.from(document.querySelectorAll('#update-slot-grid input[type=checkbox]:checked')).map(i=>i.dataset.slot);
  submitRoomRequest(state.mentor.bootcampId, state.mentor.mentorId, state.mentor.name, roomId, roomName, day, checked);
}
function footer(){
  return `<div class="footer-note">AUST ROBOTICS CLUB — built for members<br><b>Developed by: Ratul Krishna Mojumder</b></div>`;
}

/* ============================================================================
   MASTER RENDER
   ============================================================================ */
function render(){
  const app = document.getElementById("app");
  if(!fbReady && state.view !== "home" && state.view !== "adminLogin"){
    app.innerHTML = topbar() + `<div class="container">${setupBanner()}<div class="empty">Configure Firebase first (see banner above / comments at the top of this file).</div></div>` + footer();
    return;
  }
  let content = "";
  switch(state.view){
    case "home": content = renderHome(); break;
    case "bootcampPublic": content = renderBootcampPublic(); break;
    case "adminLogin": content = renderAdminLogin(); break;
    case "adminDashboard": content = renderAdminDashboard(); break;
    case "mentorDashboard": content = renderMentorDashboard(); break;
    default: content = renderHome();
  }
  app.innerHTML = content + footer();
  if(state.view === "mentorDashboard" && state.mentorTab === "check"){
    app_searchRooms();
  }
}


/* boot */
if(state.mentor) state.view = "mentorDashboard";
history.replaceState({ snapshot: JSON.parse(JSON.stringify(state)) }, "", "");
render();
</script>
</body>
</html>
